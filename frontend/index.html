<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>StockPro Dashboard</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Chart.js + Financial -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial"></script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <h2>📈 StockPro</h2>
    <ul>
        <li onclick="showSection('dashboard')">Dashboard</li>
        <li onclick="showSection('predict')">Predict</li>
        <li onclick="showSection('leaderboard')">Leaderboard</li>
    </ul>
</nav>

<div class="container">

    <!-- DASHBOARD -->
    <div id="dashboard" class="section active">

        <div class="controls">
            <input type="text" id="ticker" placeholder="Search stocks..." oninput="showSuggestions()">
            <ul id="suggestions"></ul>

            <select id="timeframe">
                <option value="1d">1 Day</option>
                <option value="1w">1 Week</option>
                <option value="1mo" selected>1 Month</option>
                <option value="3mo">3 Months</option>
                <option value="1y">1 Year</option>
            </select>

            <button onclick="loadData()">Load Data</button>
        </div>

        <h2 id="currentPrice"></h2>

        <!-- Candlestick Chart -->
        <canvas id="stockChart"></canvas>

        <!-- Indicators -->
        <canvas id="rsiChart"></canvas>
        <canvas id="macdChart"></canvas>

    </div>

    <!-- PREDICT -->
    <div id="predict" class="section">
        <h2 id="prediction"></h2>
        <button onclick="predictPrice()">Run Prediction</button>
    </div>

    <!-- LEADERBOARD -->
    <div id="leaderboard" class="section">
        <h2>🏆 Top Stocks</h2>
        <ul id="leaderboardList"></ul>
        <button onclick="loadLeaderboard()">Refresh</button>
    </div>

</div>

<script>
const API_BASE = "http://127.0.0.1:5000";
let chart;

// NAVIGATION
function showSection(id) {
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

// AUTOCOMPLETE
const popularStocks = ["AAPL","TSLA","MSFT","GOOGL","AMZN","NVDA"];

function showSuggestions() {
    const input = document.getElementById("ticker").value.toUpperCase();
    const list = document.getElementById("suggestions");
    list.innerHTML = "";

    const matches = popularStocks.filter(s => s.includes(input));

    matches.forEach(stock => {
        const li = document.createElement("li");
        li.innerText = stock;
        li.onclick = () => {
            document.getElementById("ticker").value = stock;
            list.innerHTML = "";
        };
        list.appendChild(li);
    });
}

// LOAD DATA
async function loadData() {
    const ticker = document.getElementById("ticker").value;
    const timeframe = document.getElementById("timeframe").value;

    let interval = "1d";
    if (timeframe === "1d") interval = "5m";
    if (timeframe === "1w") interval = "1h";

    const res = await fetch(`${API_BASE}/stock/${ticker}?period=${timeframe}&interval=${interval}`);
    const data = await res.json();

    renderCandlestick(data);
    renderRSI(data);
    renderMACD(data);
    getCurrentPrice();
}

// CURRENT PRICE
async function getCurrentPrice() {
    const ticker = document.getElementById("ticker").value;
    const res = await fetch(`${API_BASE}/current/${ticker}`);
    const data = await res.json();

    document.getElementById("currentPrice").innerText =
        `Current Price: $${data.price.toFixed(2)}`;
}

// PREDICTION
async function predictPrice() {
    const ticker = document.getElementById("ticker").value;
    const res = await fetch(`${API_BASE}/predict/${ticker}`);
    const data = await res.json();

    document.getElementById("prediction").innerText =
        `Predicted Price: $${data.predicted_price.toFixed(2)}`;
}

// CANDLESTICK CHART
function renderCandlestick(data) {
    const ctx = document.getElementById("stockChart").getContext("2d");

    const formatted = data.map(d => ({
        x: new Date(d.Date || d.Datetime),
        o: d.Open,
        h: d.High,
        l: d.Low,
        c: d.Close
    }));

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "candlestick",
        data: {
            datasets: [{
                label: "Stock Price",
                data: formatted
            }]
        }
    });
}

// RSI
function renderRSI(data) {
    const rsi = data.map(d => d.RSI || 0);

    new Chart(document.getElementById("rsiChart"), {
        type: "line",
        data: {
            labels: data.map(d => d.Date || d.Datetime),
            datasets: [{ label: "RSI", data: rsi }]
        }
    });
}

// MACD
function renderMACD(data) {
    const macd = data.map(d => d.MACD || 0);

    new Chart(document.getElementById("macdChart"), {
        type: "line",
        data: {
            labels: data.map(d => d.Date || d.Datetime),
            datasets: [{ label: "MACD", data: macd }]
        }
    });
}

// LEADERBOARD
async function loadLeaderboard() {
    const res = await fetch(`${API_BASE}/leaderboard`);
    const data = await res.json();

    const list = document.getElementById("leaderboardList");
    list.innerHTML = "";

    data.forEach(stock => {
        const li = document.createElement("li");
        li.innerText = `${stock.ticker}: $${stock.price}`;
        list.appendChild(li);
    });
}

// LIVE UPDATES
setInterval(getCurrentPrice, 5000);
</script>

</body>
</html>
