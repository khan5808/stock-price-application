<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stock Price Predictor</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
    <h1>📈 Stock Dashboard</h1>

    <!-- Search + Controls -->
    <div class="controls">
        <input type="text" id="ticker" placeholder="Enter ticker (AAPL, TSLA, etc.)">

        <select id="timeframe">
            <option value="1d">1 Day</option>
            <option value="1w">1 Week</option>
            <option value="1mo" selected>1 Month</option>
            <option value="3mo">3 Months</option>
            <option value="1y">1 Year</option>
        </select>

        <button onclick="loadData()">Load Data</button>
        <button onclick="predictPrice()">Predict</button>
    </div>

    <!-- Current Price -->
    <h2 id="currentPrice"></h2>

    <!-- Prediction -->
    <h2 id="prediction"></h2>

    <!-- Chart -->
    <canvas id="stockChart"></canvas>
</div>

<script>
const API_BASE = "http://127.0.0.1:5000";

let chart;

// Load stock data
async function loadData() {
    const ticker = document.getElementById("ticker").value;
    const timeframe = document.getElementById("timeframe").value;

    if (!ticker) {
        alert("Enter a ticker symbol");
        return;
    }

    let interval = "1d";

    if (timeframe === "1d") interval = "5m";
    if (timeframe === "1w") interval = "1h";

    const res = await fetch(
        `${API_BASE}/stock/${ticker}?period=${timeframe}&interval=${interval}`
    );

    const data = await res.json();

    const labels = data.map(d => d.Datetime || d.Date);
    const prices = data.map(d => d.Close);

    renderChart(labels, prices);
    getCurrentPrice();
}

// Get current price
async function getCurrentPrice() {
    const ticker = document.getElementById("ticker").value;

    const res = await fetch(`${API_BASE}/current/${ticker}`);
    const data = await res.json();

    document.getElementById("currentPrice").innerText =
        `Current Price: $${data.price.toFixed(2)}`;
}

// Predict price
async function predictPrice() {
    const ticker = document.getElementById("ticker").value;

    if (!ticker) {
        alert("Enter a ticker symbol");
        return;
    }

    const res = await fetch(`${API_BASE}/predict/${ticker}`);
    const data = await res.json();

    document.getElementById("prediction").innerText =
        `Predicted Price: $${data.predicted_price.toFixed(2)}`;
}

// Render chart
function renderChart(labels, prices) {
    const ctx = document.getElementById("stockChart").getContext("2d");

    if (chart) {
        chart.destroy();
    }

    chart = new Chart(ctx, {
        type: "line",
        data: {
            labels: labels,
            datasets: [{
                label: "Stock Price",
                data: prices,
                borderWidth: 2,
                pointRadius: 0,
                tension: 0.2
            }]
        },
        options: {
            responsive: true,
            interaction: {
                mode: "index",
                intersect: false
            },
            plugins: {
                tooltip: {
                    enabled: true,
                    callbacks: {
                        label: function(context) {
                            return `$${context.raw.toFixed(2)}`;
                        }
                    }
                }
            },
            scales: {
                x: {
                    ticks: {
                        maxTicksLimit: 10
                    }
                },
                y: {
                    beginAtZero: false
                }
            }
        }
    });
}
</script>

</body>
</html>
